name: Build and Upload SDK

on:
  push:
    branches:
      - latest
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name (e.g., latest)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # amd64 on a GitHub-hosted x64 runner.
  publish-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1
        with:
          channel: 6/stable
      - name: Install sdkcraft
        run: sudo snap install sdkcraft --classic
      - name: Define track name
        run: |
          TRACK="${INPUT_BRANCH:-${GITHUB_REF#refs/heads/}}"
          echo "TRACK=$TRACK" >> "$GITHUB_ENV"
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
      - name: Pack SDK for amd64
        run: sdkcraft --verbose pack --platform ubuntu@24.04:amd64
      - name: Upload amd64 SDK
        env:
          SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS }}
        run: |
          for sdk in *.sdk; do
            sdkcraft --verbose upload "$sdk" --release "${TRACK}/stable"
          done

  # arm64 on a GitHub-hosted arm64 runner (ubuntu-24.04-arm). Same steps as
  # amd64 — a hosted runner is a full VM, so sdkcraft managed (LXD) builds work.
  publish-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1
        with:
          channel: 6/stable
      - name: Install sdkcraft
        run: sudo snap install sdkcraft --classic
      - name: Define track name
        run: |
          TRACK="${INPUT_BRANCH:-${GITHUB_REF#refs/heads/}}"
          echo "TRACK=$TRACK" >> "$GITHUB_ENV"
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
      - name: Pack SDK for arm64
        run: sdkcraft --verbose pack --platform ubuntu@24.04:arm64
      - name: Upload arm64 SDK
        env:
          SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS }}
        run: |
          for sdk in *.sdk; do
            sdkcraft --verbose upload "$sdk" --release "${TRACK}/stable"
          done
