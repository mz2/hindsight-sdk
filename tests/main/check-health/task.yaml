summary: check-health flags a missing HINDSIGHT_API_LLM_MODEL (launch-free)

# A full `workshop launch` cannot assert this in CI: hooks/check-health only
# reaches `okay` once HINDSIGHT_API_LLM_MODEL is set AND the API answers on
# :8888, neither of which happens in a CI sandbox — so launch rolls back
# regardless of whether health is error or waiting. We therefore test the
# decision logic directly: the HINDSIGHT_API_LLM_MODEL extraction that governs
# the health verdict, kept identical to the sed in hooks/check-health.

execute: |
    bash ../../test-model-check.sh
